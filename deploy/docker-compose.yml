# Orion — Main Docker Compose
# Profiles:
#   default (no flag): gateway, scouts, directors, media, editor, pulse, dashboard, postgres, redis, milvus
#   --profile full    : adds ollama, comfyui
#   --profile gpu     : same as full + NVIDIA GPU passthrough
#   --profile tools   : adds pgAdmin, Databasus (database tools)

name: orion

networks:
  orion-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  milvusdata:
  ollamadata:
  pgadmindata:
  databasus-data:

services:

  # ─────────────────────────────────────────────
  # Database Migrations (one-shot)
  # ─────────────────────────────────────────────

  migrations:
    build:
      context: ..
      dockerfile: services/identity/Dockerfile
      target: builder
    command: ["python", "-m", "alembic", "upgrade", "head"]
    working_dir: /app
    env_file:
      - ../.env
    volumes:
      - ../migrations:/app/migrations:ro
      - ../migrations/alembic.ini:/app/alembic.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - orion-net
    restart: "no"
    mem_limit: 256m

  # ─────────────────────────────────────────────
  # App Services
  # ─────────────────────────────────────────────

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ../.env
    environment:
      - IDENTITY_URL=http://identity:8007
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orion-net
    restart: unless-stopped
    mem_limit: 512m
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  scout:
    build:
      context: ..
      dockerfile: services/scout/Dockerfile
    ports:
      - "127.0.0.1:8001:8001"
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
      milvus:
        condition: service_started
    networks:
      - orion-net
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  director:
    build:
      context: ..
      dockerfile: services/director/Dockerfile
    ports:
      - "127.0.0.1:8002:8002"
    env_file:
      - ../.env
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orion-net
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8002/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  media:
    build:
      context: ..
      dockerfile: services/media/Dockerfile
    ports:
      - "127.0.0.1:8003:8003"
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - orion-net
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8003/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  editor:
    build:
      context: ..
      dockerfile: services/editor/Dockerfile
    ports:
      - "127.0.0.1:8004:8004"
    env_file:
      - ../.env
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orion-net
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  pulse:
    build:
      context: ..
      dockerfile: services/pulse/Dockerfile
    ports:
      - "127.0.0.1:8005:8005"
    env_file:
      - ../.env
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - orion-net
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8005/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  publisher:
    build:
      context: ..
      dockerfile: services/publisher/Dockerfile
    ports:
      - "127.0.0.1:8006:8006"
    env_file:
      - ../.env
    depends_on:
      migrations:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - orion-net
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8006/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  identity:
    build:
      context: ..
      dockerfile: services/identity/Dockerfile
    ports:
      - "127.0.0.1:8007:8007"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://orion:orion@postgres:5432/orion
      - REDIS_URL=redis://redis:6379/0
      - ORION_INTERNAL_TOKEN=${ORION_INTERNAL_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8007/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - orion-net
    restart: unless-stopped
    mem_limit: 512m

  dashboard:
    build:
      context: ../dashboard
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - ../.env
    depends_on:
      - gateway
    networks:
      - orion-net
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://$(hostname):3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # Infrastructure Services
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:17-alpine
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orion_dev}
      POSTGRES_DB: ${POSTGRES_DB:-orion}
    networks:
      - orion-net
    restart: unless-stopped
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orion} -d ${POSTGRES_DB:-orion}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redisdev}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - orion-net
    restart: unless-stopped
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redisdev}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  milvus:
    image: milvusdb/milvus:v2.4.24
    command: ["milvus", "run", "standalone"]
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    volumes:
      - milvusdata:/var/lib/milvus
    environment:
      ETCD_USE_EMBED: "true"
      ETCD_DATA_DIR: /var/lib/milvus/etcd
      COMMON_STORAGETYPE: local
      COMMON_SECURITY_AUTHORIZATIONENABLED: "true"
    networks:
      - orion-net
    restart: unless-stopped
    mem_limit: 2g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # Optional Services (--profile full or --profile gpu)
  # ─────────────────────────────────────────────

  ollama:
    image: ollama/ollama:latest
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    networks:
      - orion-net
    restart: unless-stopped
    profiles:
      - full
      - gpu
    mem_limit: 4g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────
  # Database Tools (--profile tools)
  # ─────────────────────────────────────────────

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: orion-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@orion.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-orion_dev}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmindata:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - orion-net
    profiles:
      - tools

  databasus:
    image: databasus/databasus:latest
    container_name: orion-databasus
    ports:
      - "4005:4005"
    volumes:
      - databasus-data:/databasus-data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - orion-net
    profiles:
      - tools

  # No official ComfyUI image — use a community build or build from source.
  # See: https://github.com/YanWenKun/ComfyUI-Docker for options.
  comfyui:
    image: yanwenkun/comfyui:latest   # placeholder — replace with your preferred image
    ports:
      - "127.0.0.1:8188:8188"
    volumes:
      - ./comfyui/models:/app/models
      - ./comfyui/output:/app/output
    mem_limit: 4g
    networks:
      - orion-net
    restart: unless-stopped
    profiles:
      - full
      - gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
