global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: orion

rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:

  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Go services (gateway + any future Go services)
  - job_name: gateway
    static_configs:
      - targets: ["gateway:8000"]
    metrics_path: /metrics

  - job_name: director
    static_configs:
      - targets: ["director:8002"]
    metrics_path: /metrics

  - job_name: editor
    static_configs:
      - targets: ["editor:8004"]
    metrics_path: /metrics

  # Python services
  - job_name: scout
    static_configs:
      - targets: ["scout:8001"]
    metrics_path: /metrics

  - job_name: media
    static_configs:
      - targets: ["media:8003"]
    metrics_path: /metrics

  - job_name: pulse
    static_configs:
      - targets: ["pulse:8005"]
    metrics_path: /metrics

  # Postgres exporter (optional — add postgres-exporter service to enable)
  # - job_name: postgres
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]

  # Redis exporter (optional — add redis-exporter service to enable)
  # - job_name: redis
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]

  # Milvus
  - job_name: milvus
    static_configs:
      - targets: ["milvus:9091"]
    metrics_path: /metrics

  # Ollama (when running --profile full or --profile gpu)
  - job_name: ollama
    static_configs:
      - targets: ["ollama:11434"]
    metrics_path: /api/metrics
