# ----------------------------------------------------------------------------
# Theme configuration
# ----------------------------------------------------------------------------
[project.theme]

language = "en"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
    "search.suggest",
]

[project.theme.icon]
logo = "lucide/orbit"

[project.theme.icon.admonition]
note = "lucide/sticky-note"
abstract = "lucide/file-text"
info = "lucide/info"
tip = "lucide/lightbulb"
success = "lucide/check-circle"
question = "lucide/help-circle"
warning = "lucide/alert-triangle"
failure = "lucide/x-circle"
danger = "lucide/zap"
bug = "lucide/bug"
example = "lucide/flask-conical"
quote = "lucide/quote"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[[project.theme.palette]]
scheme = "default"
primary = "deep purple"
accent = "amber"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "deep purple"
accent = "amber"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# Social links
# ----------------------------------------------------------------------------
#[[project.extra.social]]
#icon = "fontawesome/brands/github"
#link = "https://github.com/orion-rigel/orion"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown]
extensions = [
    "admonition",
    "attr_list",
    "def_list",
    "footnotes",
    "md_in_html",
    "tables",
    "toc",
    "pymdownx.details",
    "pymdownx.emoji",
    "pymdownx.highlight",
    "pymdownx.inlinehilite",
    "pymdownx.keys",
    "pymdownx.mark",
    "pymdownx.superfences",
    "pymdownx.tabbed",
    "pymdownx.tasklist",
]

# Mermaid diagram support
[[project.markdown.extensions_configs."pymdownx.superfences".custom_fences]]
name = "mermaid"
class = "mermaid"
format = "pymdownx.superfences.fence_code_format"

# Tabbed content with alternate style
[project.markdown.extensions_configs."pymdownx.tabbed"]
alternate_style = true

# Task list with clickable checkboxes
[project.markdown.extensions_configs."pymdownx.tasklist"]
custom_checkbox = true

# Emoji/icon provider
[project.markdown.extensions_configs."pymdownx.emoji"]
emoji_index = "pymdownx.emoji.twemoji"
emoji_generator = "pymdownx.emoji.to_svg"

# Table of contents settings
[project.markdown.extensions_configs.toc]
permalink = true
toc_depth = 3
