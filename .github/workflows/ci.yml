name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - run: go vet ./...
      - run: go test ./... -race -coverprofile=coverage.out
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  python-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [scout, director, media, editor, pulse, publisher]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - uses: astral-sh/setup-uv@v7
      - name: Install dependencies
        run: uv sync --package orion-${{ matrix.service }}
      - name: Lint
        run: uv run --package orion-${{ matrix.service }} ruff check services/${{ matrix.service }}/src/ services/${{ matrix.service }}/tests/
      - name: Type check
        run: uv run --package orion-${{ matrix.service }} mypy services/${{ matrix.service }}/src/ --ignore-missing-imports
      - name: Test
        run: uv run --package orion-${{ matrix.service }} pytest services/${{ matrix.service }}/tests/ -v --tb=short

  dashboard-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json
      - run: cd dashboard && npm ci
      - run: cd dashboard && npm run lint
      - run: cd dashboard && npm run test:ci

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL'
          exit-code: '0'
      # Gitleaks removed — requires paid license (gitleaks.io)
      # - name: Run Gitleaks
