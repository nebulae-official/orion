# Orion — Continuous Deployment Pipeline
#
# Builds and pushes Docker images to GitHub Container Registry (GHCR)
# when a version tag is pushed.
#
# Usage:
#   git tag v1.0.0
#   git push origin v1.0.0
#
# This will build all service images and push them as:
#   ghcr.io/<owner>/orion-<service>:v1.0.0
#   ghcr.io/<owner>/orion-<service>:latest
#
# Prerequisites:
#   - GITHUB_TOKEN has write:packages permission (automatic in GitHub Actions)
#   - Repository settings allow GitHub Actions to push to GHCR

name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway
            context: .
            dockerfile: deploy/Dockerfile.gateway
          - service: scout
            context: .
            dockerfile: services/scout/Dockerfile
          - service: director
            context: .
            dockerfile: services/director/Dockerfile
          - service: media
            context: .
            dockerfile: services/media/Dockerfile
          - service: editor
            context: .
            dockerfile: services/editor/Dockerfile
          - service: pulse
            context: .
            dockerfile: services/pulse/Dockerfile
          - service: publisher
            context: .
            dockerfile: services/publisher/Dockerfile
          - service: identity
            context: .
            dockerfile: services/identity/Dockerfile
          - service: dashboard
            context: ./dashboard
            dockerfile: ./dashboard/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image name
        id: image-name
        env:
          REPO_OWNER: ${{ github.repository_owner }}
          SERVICE: ${{ matrix.service }}
        run: echo "name=${REGISTRY}/${REPO_OWNER}/orion-${SERVICE}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image-name.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
